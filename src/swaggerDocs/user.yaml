paths:
  /users/me:
    get:
      summary: 내 정보 조회
      tags: [Users]
      security:
        - cookieAuth: []
      description: "현재 로그인된 사용자의 프로필 정보를 반환합니다. (AccessToken 쿠키 필요)"
      responses:
        200:
          description: 조회 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/UserProfile'
        401:
          description: "인증 실패 (유효하지 않거나 만료된 토큰)"
        404:
          description: "사용자를 찾을 수 없음"