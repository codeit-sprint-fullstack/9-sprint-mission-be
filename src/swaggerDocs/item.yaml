paths:
  /items:
    get:
      summary: 상품 목록 조회
      tags: [Items]
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 10
        - in: query
          name: keyword
          schema:
            type: string
        - in: query
          name: orderBy
          schema:
            type: string
            enum: [recent, favorite]
            default: recent
      responses:
        200:
          description: 조회 성공

    post:
      summary: 새 상품 등록
      tags: [Items]
      security:
        - cookieAuth: []
      description: "이미지 파일(images)을 포함한 상품 정보를 등록합니다. (multipart/form-data)"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [name, description, price, images]
              properties:
                name:
                  type: string
                  example: "중고 판다 인형"
                description:
                  type: string
                  example: "상태 아주 좋은 판다 인형 판매합니다."
                price:
                  type: string
                  example: "15000"
                tags:
                  type: array
                  items:
                    type: string
                  example: ["인형", "중고", "판다"]
                images:
                  type: array
                  items:
                    type: string
                    format: binary
                  description: "상품 이미지 파일들 (최대 수량은 Multer 설정에 따름)"
      responses:
        201:
          description: 상품 등록 성공
        400:
          description: "유효성 검사 실패 (Zod Error)"
        401:
          description: 인증 실패

  /items/{itemId}:
    parameters:
      - in: path
        name: itemId
        required: true
        schema:
          type: string
        description: 상품 ID

    get:
      summary: 상품 상세 조회
      tags: [Items]
      responses:
        200:
          description: 조회 성공
        404:
          description: 상품을 찾을 수 없음

    patch:
      summary: 상품 정보 수정
      tags: [Items]
      security:
        - cookieAuth: []
      description: "수정할 부분만 전송하며, 이미지 변경 시 새 파일들을 업로드합니다."
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                name:
                  type: string
                description:
                  type: string
                price:
                  type: string
                tags:
                  type: array
                  items:
                    type: string
                images:
                  type: array
                  items:
                    type: string
                    format: binary
      responses:
        200:
          description: 수정 성공

    delete:
      summary: 상품 삭제
      tags: [Items]
      security:
        - cookieAuth: []
      responses:
        200:
          description: 삭제 성공