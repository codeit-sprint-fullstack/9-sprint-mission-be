paths:
  /articles:
    get:
      summary: 게시글 목록 조회
      tags: [Articles]
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
          description: 페이지 번호
        - in: query
          name: limit
          schema:
            type: integer
            default: 10
          description: 한 페이지당 게시글 수
        - in: query
          name: keyword
          schema:
            type: string
          description: 검색 키워드
        - in: query
          name: orderBy
          schema:
            type: string
            enum: [recent, favorite]
            default: recent
          description: 정렬 순서
      responses:
        200:
          description: 조회 성공
          
    post:
      summary: 새 게시글 작성
      tags: [Articles]
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, content]
              properties:
                title:
                  type: string
                  example: "판다마켓 이용 후기"
                content:
                  type: string
                  example: "정말 좋은 물건이 많네요!"
                images:
                  type: array
                  items:
                    type: string
                  example: ["https://example.com/image.jpg"]
      responses:
        201:
          description: 게시물 생성 성공
        401:
          description: 인증 실패 (accessToken 없음)

  /articles/best:
    get:
      summary: 베스트 게시글 조회
      tags: [Articles]
      responses:
        200:
          description: 조회 성공

  /articles/{articleId}:
    parameters:
      - in: path
        name: articleId
        required: true
        schema:
          type: string
        description: 게시글 ID

    get:
      summary: 게시글 상세 조회
      tags: [Articles]
      responses:
        200:
          description: 조회 성공
        404:
          description: 게시글을 찾을 수 없음

    patch:
      summary: 게시글 수정
      tags: [Articles]
      security:
        - cookieAuth: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateArticle'
      responses:
        200:
          description: 수정 성공
        401:
          description: 권한 없음 (작성자 불일치)

    delete:
      summary: 게시글 삭제
      tags: [Articles]
      security:
        - cookieAuth: []
      responses:
        200:
          description: 삭제 성공
        401:
          description: 권한 없음 (작성자 불일치)

